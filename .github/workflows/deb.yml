name: Release

# Build a .deb and publish a GitHub Release whenever meson.build's version is
# bumped to a version that has not been released yet. Pushes that don't change
# the version do nothing — no validation builds, no artifacts.
on:
  push:
    branches: [main]

permissions:
  contents: write   # create tags/releases

jobs:
  release:
    runs-on: ubuntu-24.04   # noble — same base as elementary OS 8
    steps:
      - uses: actions/checkout@v4

      - name: Read version from meson.build
        id: v
        run: |
          VERSION=$(grep -oP "version:\s*'\K[0-9]+\.[0-9]+\.[0-9]+" meson.build | head -1)
          if [ -z "$VERSION" ]; then echo "could not parse version from meson.build" >&2; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "meson.build version: $VERSION"

      - name: Skip if this version is already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.v.outputs.version }}" >/dev/null 2>&1; then
            echo "release=exists" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.v.outputs.version }} already exists — nothing to do."
          else
            echo "release=new" >> "$GITHUB_OUTPUT"
            echo "New version — will build and release."
          fi

      - name: Install build dependencies
        if: steps.check.outputs.release == 'new'
        run: |
          sudo add-apt-repository -y ppa:elementary-os/stable
          sudo apt-get update
          sudo apt-get install -y \
            build-essential devscripts debhelper dpkg-dev \
            meson ninja-build valac pkg-config \
            libgtk-3-dev libgee-0.8-dev libwingpanel-dev libgudev-1.0-dev

      - name: Build the .deb
        if: steps.check.outputs.release == 'new'
        run: |
          # meson.build is the source of truth — sync the changelog version to it.
          sed -i "1s/([^)]*)/(${{ steps.v.outputs.version }})/" debian/changelog
          dpkg-buildpackage -us -uc -b
          mkdir -p dist && mv ../*.deb dist/
          ls -l dist/

      - name: Publish release
        if: steps.check.outputs.release == 'new'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.v.outputs.version }}
          name: v${{ steps.v.outputs.version }}
          generate_release_notes: true
          files: dist/*.deb
