name: Build .deb

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to attach the .deb to a Release on tags

jobs:
  build:
    runs-on: ubuntu-24.04   # noble — same base as elementary OS 8
    steps:
      - uses: actions/checkout@v4

      - name: Add elementary PPA and install build dependencies
        run: |
          sudo add-apt-repository -y ppa:elementary-os/stable
          sudo apt-get update
          sudo apt-get install -y \
            build-essential devscripts debhelper dpkg-dev \
            meson ninja-build valac pkg-config \
            libgtk-3-dev libgee-0.8-dev libwingpanel-dev libgudev-1.0-dev

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      # Non-tag pushes/PRs just build to validate — nothing is stored.
      # The .deb is kept only by attaching it to the GitHub Release on a tag.
      - name: Collect .deb
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p dist
          mv ../*.deb dist/
          ls -l dist/

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
