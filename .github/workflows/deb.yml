name: Build .deb

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to attach the .deb to a Release on tags

jobs:
  build:
    runs-on: ubuntu-24.04   # noble — same base as elementary OS 8
    steps:
      - uses: actions/checkout@v4

      - name: Add elementary PPA and install build dependencies
        run: |
          sudo add-apt-repository -y ppa:elementary-os/stable
          sudo apt-get update
          sudo apt-get install -y \
            build-essential devscripts debhelper dpkg-dev \
            meson ninja-build valac pkg-config \
            libgtk-3-dev libwingpanel-dev libgudev-1.0-dev

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          mv ../*.deb dist/
          ls -l dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: dist/*.deb

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
